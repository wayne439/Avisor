# PilotAvisor PWA — static hosting, no build step
# Serves public/ directly — avisor.html is the single-file app
[build]
  command = ""
  publish = "public"

[[headers]]
  for = "/avisor.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
