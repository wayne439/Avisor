# PilotAvisor PWA — static hosting, no build step
# Serves public/ directly — avisor.html is the single-file app
[build]
  command = ""
  publish = "public"

# API proxies — mirror Vite dev server proxy rules
[[redirects]]
  from = "/awc-api/*"
  to = "https://aviationweather.gov/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/faa-api/*"
  to = "https://api.faa.gov/:splat"
  status = 200
  force = true

[[headers]]
  for = "/avisor.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
